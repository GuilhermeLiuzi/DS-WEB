<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário - Validação JS</title>

<style>
span{
color:red;
}
</style>

</head>

<body>

<h1>Formulário de Cadastro</h1>
<p>Preencha todos os campos e clique em Enviar.</p>

<form id="formulario">

<label for="nome">Nome:</label>
<input type="text" id="nome" placeholder="Digite seu nome">
<span id="erro-nome"></span>

<br><br>

<label for="email">E-mail:</label>
<input type="text" id="email" placeholder="Digite seu email">

<span id="erro-email"></span>

<br><br>

<label for="senha">Senha:</label>
<input type="password" id="senha" placeholder="Digite sua senha">

<br>

<label for="confirma-senha">Confirmar senha:</label>
<input type="password" id="confirma-senha" placeholder="Confirme sua senha">
<span id="erro-senha"></span>

<br><br>

<label for="cpf">CPF:</label>
<input type="text" id="cpf" placeholder="Digite seu CPF">
<span id="erro-cpf"></span>

<br><br>

<label for="telefone">Telefone:</label>
<input type="text" id="telefone" placeholder="Digite seu telefone">
<span id="erro-telefone"></span>

<br><br>

<label for="cep">CEP:</label>
<input type="text" id="cep" placeholder="Digite seu CEP">
<span id="erro-cep"></span>

<br><br>

<label for="data-nascimento">Data:</label>
<input type="text" id="data-nascimento" placeholder="DD/MM/AAAA">
<span id="erro-data-nascimento"></span>

<br><br>

<label for="valor">Valor:</label>
<input type="text" id="valor" placeholder="Digite o valor">
<span id="erro-valor"></span>

<br><br>

<label for="url">URL:</label>
<input type="text" id="url" placeholder="Digite a URL">
<span id="erro-url"></span>

<br><br>

<label for="cartao">Número do cartão:</label>
<input type="text" id="cartao" placeholder="Digite o número do cartão">
<span id="erro-cartao"></span>

<br><br>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

<hr>

<div id="resultado"></div>

<script src="script.js"></script>

</body>
</html>
